name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm test

    playwright:
      name: Playwright Tests
      runs-on: ubuntu-latest
      needs: build
      timeout-minutes: 15                      # ← add this; safety net
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm
        - run: pnpm install --frozen-lockfile=false
        - run: pnpm build                      # ← add this BEFORE playwright test runs
        - run: pnpm exec playwright install --with-deps chromium
        - run: pnpm -r --filter "./examples/*" test
        - uses: actions/upload-artifact@v4
          if: failure()
          with:
            name: playwright-report
            path: "**/playwright-report/"
            retention-days: 7

name: Bug Report
description: Report a bug in bgstm-playwright-frameworks
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
  - type: input
    id: package
    attributes:
      label: Affected package
      description: Which package is affected? (e.g. @bgstm/playwright-core, @bgstm/domain-crm)
      placeholder: "@bgstm/playwright-core"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Install @bgstm/playwright-core
        2. Configure bgstmReporter in playwright.config.ts
        3. Run `pnpm test`
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
  - type: input
    id: pnpm-version
    attributes:
      label: pnpm version
      placeholder: "9.x"
  - type: input
    id: playwright-version
    attributes:
      label: Playwright version
      placeholder: "1.48.x"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
